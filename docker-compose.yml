version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: propstream-db
    environment:
      POSTGRES_USER: propstream
      POSTGRES_PASSWORD: propstream_dev
      POSTGRES_DB: propstream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propstream"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: propstream-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
